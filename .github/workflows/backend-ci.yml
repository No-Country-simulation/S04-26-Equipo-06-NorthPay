name: Backend CI (Spring Boot 4)

on:
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: Backend

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_DB: northpay_db
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/northpay_db
          SPRING_DATASOURCE_USERNAME: user_test
          SPRING_DATASOURCE_PASSWORD: password_test
          JWT_SECRET: test_secret_key_123456789